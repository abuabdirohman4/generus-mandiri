name: Deploy Staging (self-host data plane)
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          NEXT_PUBLIC_DATA_POSTGREST_URL: ${{ secrets.NEXT_PUBLIC_DATA_POSTGREST_URL_STAGING }}
      - run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Register server host key
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Rsync artifact to server (staging dir, separate from prod)
        run: |
          rsync -az --delete --exclude='.env' --exclude='ecosystem.config.js' .next/standalone/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/ubuntu/apps/generus-mandiri-staging/
      - name: Reload staging app via pm2
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "source ~/.nvm/nvm.sh && cd /home/ubuntu/apps/generus-mandiri-staging && pm2 reload generus-mandiri-staging || pm2 start ecosystem.config.js --name generus-mandiri-staging"
